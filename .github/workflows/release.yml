name: Release Android APK

on:
  push:
    tags: ["v*"]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - name: Build web bundle
        run: bun run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: bun add -d @capacitor/cli

      - name: Add Android platform (if absent)
        run: |
          if [ ! -d android ]; then
            bunx cap add android
          fi
          bunx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk app-release.apk || \
          cp android/app/build/outputs/apk/release/app-release.apk app-release.apk
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app-release-signed.apk \
            app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmegp-assistant-apk
          path: |
            app-release-signed.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release-signed.apk
          generate_release_notes: true
