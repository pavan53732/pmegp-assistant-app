name: Release Android APK (unsigned)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - name: Download Tesseract.js offline assets
        run: |
          mkdir -p public/tesseract
          curl -sL "https://unpkg.com/tesseract.js@5.1.1/dist/worker.min.js" -o public/tesseract/worker.min.js
          curl -sL "https://unpkg.com/tesseract.js-core@5.1.1/tesseract-core-simd.wasm.js" -o public/tesseract/tesseract-core-simd.wasm.js
          curl -sL "https://unpkg.com/tesseract.js-core@5.1.1/tesseract-core-simd.wasm" -o public/tesseract/tesseract-core-simd.wasm
          curl -sL "https://tessdata.projectnaptha.com/4.0.0/eng.traineddata.gz" -o public/tesseract/eng.traineddata.gz
      - name: Build web bundle
        run: bun run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: bun add -d @capacitor/cli

      - name: Add Android platform (if absent)
        run: |
          if [ ! -d android ]; then
            bunx cap add android
          fi
          bunx cap sync android

      - name: Build debug APK (unsigned, no signing required)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename unsigned APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            release/pmegp-assistant-unsigned.apk

      - name: Upload unsigned APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmegp-assistant-unsigned-apk
          path: release/pmegp-assistant-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/pmegp-assistant-unsigned.apk
          generate_release_notes: true
          body: |
            ## PMEGP Assistant — Unsigned Debug APK

            This is an **unsigned debug build** suitable for testing.
            To install on a device, enable "Install from unknown sources"
            and sideload the APK.

            **Build:** ${{ github.sha }}
            **Tag:** ${{ github.ref_name }}
